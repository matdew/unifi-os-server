---
services:
  mongodb:
    image: mongo:7.0
    container_name: unifi-mongodb
    volumes:
      - /path/to/unifi-os-server/mongodb-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  unifi-os-server:
    image: ghcr.io/matdew/unifi-os-server:latest
    container_name: unifi-os-server
    cgroup: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    tmpfs:
      - /run:exec
      - /run/lock
      - /tmp:exec
      - /var/lib/journal
      - /var/opt/unifi/tmp:size=64m
    environment:
      - UOS_SYSTEM_IP=unifi.example.com
      - MONGO_HOST=mongodb
      # - MONGO_WAIT_TIMEOUT=120
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /path/to/unifi-os-server/persistent:/persistent
      - /path/to/unifi-os-server/var-log:/var/log
      - /path/to/unifi-os-server/data:/data
      - /path/to/unifi-os-server/srv:/srv
      - /path/to/unifi-os-server/var-lib-unifi:/var/lib/unifi
      # var-lib-mongodb mount removed: MongoDB now runs in its own container
      - /path/to/unifi-os-server/etc-rabbitmq-ssl:/etc/rabbitmq/ssl
    ports:
      - 11443:443
      - 5005:5005 # Optional
      - 9543:9543 # Optional
      - 6789:6789 # Optional
      - 8080:8080
      - 8443:8443 # Optional
      - 8444:8444 # Optional
      - 3478:3478/udp
      - 5514:5514/udp # Optional
      - 10003:10003/udp
      - 11084:11084 # Optional
      - 5671:5671 # Optional
      - 8880:8880 # Optional
      - 8881:8881 # Optional
      - 8882:8882 # Optional
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
